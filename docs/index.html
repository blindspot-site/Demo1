<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discover India — Interactive Map</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>

<style>
body { margin:0; font-family: Arial; background:#0D1117; color:#fff; }
#map { width:100vw; height:100vh; }

.state { fill:#1f3b5c; stroke:#111; cursor:pointer; }
.state:hover { fill:#2c5a87; }

.highlight { fill:#E8621A !important; }

.panel {
  position:fixed; right:0; top:0;
  width:340px; height:100%;
  background:#111;
  padding:20px;
  transform:translateX(100%);
  transition:0.4s;
  overflow:auto;
}
.panel.open { transform:translateX(0); }

h2 { margin-top:0; }
button {
  display:block;
  margin:8px 0;
  padding:10px;
  width:100%;
  border:none;
  background:#222;
  color:#fff;
  cursor:pointer;
}
button:hover { background:#E8621A; }
</style>
</head>

<body>

<svg id="map"></svg>

<div id="panel" class="panel">
  <h2 id="title"></h2>
  <div id="content"></div>
</div>

<script>

// ================= CONFIG =================
const CITY_DATA = {
  delhi: {
    match: ['delhi'],
    title: 'Delhi',
    food: ['Karol Bagh', 'Chandni Chowk'],
    shopping: ['Wedding Shopping', 'Casual Shopping']
  },
  mumbai: {
    match: ['maharashtra'],
    title: 'Mumbai',
    food: ['Juhu Beach', 'Mohammed Ali Road'],
    shopping: ['Colaba Causeway', 'Linking Road']
  }
};

// ================= MAP =================
const width = window.innerWidth;
const height = window.innerHeight;

const svg = d3.select("#map")
  .attr("width", width)
  .attr("height", height);

const projection = d3.geoMercator()
  .center([82.5, 22])
  .scale(900)
  .translate([width/2, height/2]);

const path = d3.geoPath().projection(projection);

// ================= HELPERS =================
function getCity(name) {
  if (!name) return null;
  name = name.toLowerCase();

  return Object.keys(CITY_DATA).find(key =>
    CITY_DATA[key].match.some(m => name.includes(m))
  );
}

// ================= PANEL =================
function openCity(cityKey) {
  const city = CITY_DATA[cityKey];
  if (!city) return;

  document.getElementById("panel").classList.add("open");
  document.getElementById("title").innerText = city.title;

  document.getElementById("content").innerHTML = `
    <button onclick="showFood('${cityKey}')">Best Food Options</button>
    <button onclick="showShopping('${cityKey}')">Best Shopping Options</button>
  `;
}

function showFood(cityKey) {
  const city = CITY_DATA[cityKey];

  document.getElementById("content").innerHTML = `
    <h3>Food Areas</h3>
    ${city.food.map(f => `<button>${f}</button>`).join("")}
    <button onclick="openCity('${cityKey}')">← Back</button>
  `;
}

function showShopping(cityKey) {
  const city = CITY_DATA[cityKey];

  document.getElementById("content").innerHTML = `
    <h3>Shopping</h3>
    ${city.shopping.map(s => `<button>${s}</button>`).join("")}
    <button onclick="openCity('${cityKey}')">← Back</button>
  `;
}

// ================= LOAD MAP =================
fetch("https://cdn.jsdelivr.net/npm/india-geojson@1.0.0/india_states.geojson")
  .then(res => res.json())
  .then(data => {

    svg.selectAll("path")
      .data(data.features)
      .enter()
      .append("path")
      .attr("d", path)
      .attr("class", d => {
        const name = d.properties.st_nm || d.properties.NAME_1 || d.properties.name || "";
        const city = getCity(name);
        return "state " + (city ? "highlight" : "");
      })
      .on("click", function(event, d) {
        const name = d.properties.st_nm || d.properties.NAME_1 || d.properties.name || "";
        const cityKey = getCity(name);

        console.log("Clicked:", name);

        if (cityKey) {
          openCity(cityKey);
        }
      });

  });

</script>

</body>
</html>
